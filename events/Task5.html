<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task5</title>
    <link rel="stylesheet" href="Task5.css">
    <script src="Task5.js" defer></script>
</head>
<body>
    <div>
          <input type="text" id="fontfamily" list="ff" placeholder="Choose Font...">
        <datalist id="ff">
            <option value="Arial">Arial</option>
            <option value="Courier">Courier</option>
            <option value="Calibri">Calibri</option>
            <option value="sans-serif">sans-serif</option>
        </datalist>
          <input type="text" id="fontsize" list="fs" placeholder="Choose Font size ...">
        <datalist name="fontsize" id="fs">

        </datalist>
        <label for="it">Italic</label>
        <input type="checkbox" id="it">
        <label for="b">Bold</label>
        <input type="checkbox" id="b">
        <label for="ul">Underline</label>
        <input type="checkbox" id="ul">
    </div>
    <textarea name="text" id="in" rows="10" cols="80">

    </textarea>
</body>
</html>
